[buildout]

extends =
    dev.cfg

auto-checkout +=
    plonemeeting.communes
    Products.MeetingCharleroi

parts +=
    testcharleroi

[instance1]
eggs +=
    Products.MeetingCharleroi

zcml +=
    Products.MeetingCharleroi
    plonemeeting.communes
    imio.pm.locales

[sources]

[testcharleroi]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress', '-s', 'Products.MeetingCharleroi']
eggs =
    ${test:eggs}
    Products.MeetingCharleroi [test]
environment = testenv

