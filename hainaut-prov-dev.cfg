[buildout]

extends =
    dev.cfg

auto-checkout +=
    plonemeeting.communes
    Products.MeetingPROVHainaut

parts +=
    testmc
    testhainaut

[instance1]
eggs +=
    Products.MeetingPROVHainaut

zcml +=
    Products.MeetingPROVHainaut
    plonemeeting.communes
    imio.pm.locales

[sources]

[testmc]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress', '-s', 'plonemeeting.communes']
eggs =
    ${test:eggs}
    plonemeeting.communes [test]
environment = testenv

[testhainaut]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress', '-s', 'Products.MeetingPROVHainaut']
eggs =
    ${test:eggs}
    Products.MeetingPROVHainaut [test]
environment = testenv
