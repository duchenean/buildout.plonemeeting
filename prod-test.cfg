[buildout]

extends =
    dev.cfg

auto-checkout =

parts =
    testprod

[testprod]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress', '-s', 'plonemeeting.communes', '-s', 'plonemeeting.restapi']
eggs =
    ${test:eggs}
    plonemeeting.communes [test]
    plonemeeting.restapi [test]
environment = testenv
