[buildout]

extends =
    dev.cfg

auto-checkout +=
    Products.MeetingSeraing
    plonemeeting.communes

parts +=
    testseraing

[instance1]
eggs +=
    Products.MeetingSeraing

zcml +=
    Products.MeetingSeraing
    plonemeeting.communes
    imio.pm.locales

[sources]
Products.MeetingSeraing = git ${remotes:imio}/Products.MeetingSeraing.git pushurl=${remotes:imio_push}/Products.MeetingSeraing.git branch=master
plonemeeting.communes = git ${remotes:imio}/plonemeeting.communes.git pushurl=${remotes:imio_push}/plonemeeting.communes.git branch=master

[testseraing]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress', '-s', 'Products.MeetingSeraing']
eggs =
    ${test:eggs}
    Products.MeetingSeraing [test]
environment = testenv

